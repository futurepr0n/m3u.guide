<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ playlist_name }} — Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

        html, body {
            height: 100%; background: #131313; color: #e5e2e1;
            font-family: 'Inter', sans-serif; overflow: hidden;
        }

        /* ── Top bar ── */
        .top-bar {
            height: 56px; background: #131313;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 1.5rem; flex-shrink: 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .top-bar-left { display: flex; align-items: center; gap: 1rem; }
        .back-link {
            display: flex; align-items: center; gap: 0.35rem;
            color: rgba(255,255,255,0.4); text-decoration: none;
            font-size: 0.7rem; font-weight: 500; text-transform: uppercase;
            letter-spacing: 0.06em; transition: color 0.15s;
        }
        .back-link:hover { color: white; }
        .back-link .material-symbols-outlined { font-size: 16px; }
        .playlist-title {
            font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 0.95rem;
            color: #e5e2e1; letter-spacing: -0.02em;
        }
        .playlist-title span { color: #00d4ff; }

        .top-bar-right { display: flex; align-items: center; gap: 0.5rem; }
        .indicator {
            font-size: 0.65rem; color: rgba(255,255,255,0.25);
            text-transform: uppercase; letter-spacing: 0.06em;
        }

        /* ── Tab bar ── */
        .tab-bar {
            height: 48px; background: #0e0e0e;
            display: flex; align-items: center;
            padding: 0 1.5rem; gap: 0.4rem; flex-shrink: 0;
            overflow-x: auto;
        }
        .tab-bar::-webkit-scrollbar { display: none; }
        .tab-btn {
            display: flex; align-items: center; gap: 0.4rem;
            padding: 0.3rem 0.85rem; border-radius: 9999px;
            background: transparent; color: rgba(255,255,255,0.4);
            border: none; cursor: pointer;
            font-family: 'Inter', sans-serif; font-size: 0.7rem;
            font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;
            white-space: nowrap; transition: all 0.15s;
        }
        .tab-btn:hover { background: #353534; color: rgba(255,255,255,0.8); }
        .tab-btn.active {
            background: #00d4ff; color: #003642; font-weight: 700;
            box-shadow: 0 0 16px rgba(0,212,255,0.25);
        }
        .tab-count {
            font-size: 0.6rem; opacity: 0.7;
            background: rgba(255,255,255,0.1);
            padding: 0.05rem 0.35rem; border-radius: 9999px;
        }
        .tab-btn.active .tab-count { background: rgba(0,54,66,0.25); opacity: 1; }

        /* ── Content area ── */
        .content-area {
            flex: 1; position: relative; overflow: hidden;
        }
        #content-frame {
            width: 100%; height: 100%; border: none;
            display: block; background: #131313;
        }

        /* ── Loading state ── */
        .loading-state {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 1rem;
            background: #131313;
        }
        .loading-spinner {
            width: 36px; height: 36px; border: 2px solid #353534;
            border-top-color: #00d4ff; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loading-text {
            font-size: 0.75rem; color: rgba(255,255,255,0.3);
            text-transform: uppercase; letter-spacing: 0.1em;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Page layout ── */
        .page { display: flex; flex-direction: column; height: 100vh; }
    </style>
</head>
<body>
<div class="page">

    <!-- Top bar -->
    <div class="top-bar">
        <div class="top-bar-left">
            <a href="/" class="back-link" onclick="cleanupAndNavigate('/'); return false;">
                <span class="material-symbols-outlined">arrow_back</span>
                Vault
            </a>
            <div class="playlist-title"><span>{{ playlist_name }}</span> — Analysis</div>
        </div>
        <div class="top-bar-right">
            <span class="indicator" id="memory-indicator"></span>
        </div>
    </div>

    <!-- Tab bar -->
    <div class="tab-bar">
        {% if analysis_files.matched %}
        <button class="tab-btn active" onclick="loadPage('matched', this)">
            <span class="material-symbols-outlined" style="font-size:14px; font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;">live_tv</span>
            Live TV
        </button>
        {% endif %}
        {% if analysis_files.movies %}
        <button class="tab-btn" onclick="loadPage('movies', this)">
            <span class="material-symbols-outlined" style="font-size:14px; font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;">movie</span>
            Movies
        </button>
        {% endif %}
        {% if analysis_files.series %}
        <button class="tab-btn" onclick="loadPage('series', this)">
            <span class="material-symbols-outlined" style="font-size:14px; font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;">tv</span>
            Series
        </button>
        {% endif %}
        {% if analysis_files.unmatched %}
        <button class="tab-btn" onclick="loadPage('unmatched', this)">
            <span class="material-symbols-outlined" style="font-size:14px;">help_outline</span>
            No EPG
        </button>
        {% endif %}
        {% if analysis_files.no_tvg %}
        <button class="tab-btn" onclick="loadPage('no_tvg', this)">
            <span class="material-symbols-outlined" style="font-size:14px;">search_off</span>
            Other
        </button>
        {% endif %}
    </div>

    <!-- Content -->
    <div class="content-area">
        <div class="loading-state" id="loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading analysis…</div>
        </div>
        <iframe id="content-frame" src="" allow="clipboard-write; clipboard-read" style="opacity:0;"></iframe>
    </div>

</div>

<script>
    const fileMap = {
        'matched':   'content_analysis_matched.html',
        'movies':    'content_analysis_movies.html',
        'series':    'content_analysis_series.html',
        'unmatched': 'content_analysis_unmatched.html',
        'no_tvg':    'content_analysis_unmatched_no_tvg.html'
    };

    const basePath = '/static/playlists/{{ user_id }}/{{ playlist_name }}/analysis/';
    let activeBtn = document.querySelector('.tab-btn.active');

    function loadPage(key, btn) {
        const frame = document.getElementById('content-frame');
        const loading = document.getElementById('loading');

        // update tabs
        if (activeBtn) activeBtn.classList.remove('active');
        btn.classList.add('active');
        activeBtn = btn;

        // show loader
        frame.style.opacity = '0';
        loading.style.display = 'flex';

        frame.onload = () => {
            try {
                injectEnhancements(frame);
            } catch(e) {}
            loading.style.display = 'none';
            frame.style.opacity = '1';
        };
        frame.src = basePath + (fileMap[key] || 'content_analysis_matched.html');
    }

    function injectEnhancements(iframe) {
        const doc = iframe.contentDocument || iframe.contentWindow.document;

        // inject clipboard bridge
        const s = doc.createElement('script');
        s.textContent = `
            window.copyStreamUrl = function(button, encodedUrl) {
                const url = decodeURIComponent(encodedUrl);
                if (window.parent && window.parent !== window) {
                    const id = 'btn-' + Math.random();
                    window.parent.postMessage({ type: 'clipboard', url, id }, '*');
                    const orig = button.innerHTML, origStyle = button.style.cssText;
                    button.innerHTML = 'Copying…'; button.disabled = true;
                    const h = e => {
                        if (e.data.type === 'clipboard-result' && e.data.id === id) {
                            button.innerHTML = e.data.success ? '✓ Copied' : '✗ Failed';
                            button.style.background = e.data.success ? '#00d4ff' : '#93000a';
                            button.style.color = e.data.success ? '#003642' : '#ffdad6';
                            setTimeout(() => { button.innerHTML = orig; button.style.cssText = origStyle; button.disabled = false; }, 1800);
                            window.removeEventListener('message', h);
                        }
                    };
                    window.addEventListener('message', h);
                }
            };
        `;
        doc.head.appendChild(s);
    }

    window.addEventListener('message', e => {
        if (e.data.type === 'clipboard') {
            const write = async t => {
                if (navigator.clipboard && window.isSecureContext) {
                    try { await navigator.clipboard.writeText(t); return true; } catch(_) {}
                }
                const ta = Object.assign(document.createElement('textarea'), { value: t, style: 'position:fixed;left:-9999px' });
                document.body.appendChild(ta); ta.focus(); ta.select();
                const ok = document.execCommand('copy');
                document.body.removeChild(ta); return ok;
            };
            write(e.data.url).then(success => e.source.postMessage({ type: 'clipboard-result', success, id: e.data.id }, '*'));
        }
    });

    function cleanupAndNavigate(url) {
        const f = document.getElementById('content-frame');
        if (f) { f.src = 'about:blank'; }
        window.location.href = url;
        return false;
    }

    // Memory indicator
    function updateMemory() {
        const el = document.getElementById('memory-indicator');
        if (el && performance.memory) {
            el.textContent = Math.round(performance.memory.usedJSHeapSize / 1048576) + 'MB';
        }
    }
    setInterval(updateMemory, 5000);

    // Init — load first available
    document.addEventListener('DOMContentLoaded', () => {
        const firstBtn = document.querySelector('.tab-btn');
        if (firstBtn) firstBtn.click();
        updateMemory();
    });
</script>
</body>
</html>
