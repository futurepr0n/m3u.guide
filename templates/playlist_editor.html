<!-- templates/playlist_editor.html -->
<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit — {{ playlist.name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

        body {
            background: #131313; color: #e5e2e1;
            font-family: 'Inter', sans-serif; min-height: 100dvh;
        }

        /* ── Sticky header ── */
        .header-actions {
            position: sticky; top: 0; z-index: 100;
            background: rgba(19,19,19,0.95); backdrop-filter: blur(12px);
            padding: 0.875rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center; gap: 1rem;
        }
        .header-title {
            font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 1rem;
            color: #e5e2e1; letter-spacing: -0.02em;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .header-title span { color: #00d4ff; }
        .toolbar { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .hdr-btn {
            padding: 0.45rem 1rem; border: none; border-radius: 9999px;
            font-family: 'Inter', sans-serif; font-size: 0.72rem; font-weight: 600;
            cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.04em;
        }
        .hdr-btn-ghost { background: #353534; color: rgba(255,255,255,0.65); }
        .hdr-btn-ghost:hover { background: #2a2a2a; color: white; }
        .hdr-btn-primary {
            background: linear-gradient(135deg, #00d4ff, #a8e8ff); color: #003642;
            font-weight: 700;
        }
        .hdr-btn-primary:hover { opacity: 0.88; }
        .hdr-btn-secondary { background: rgba(0,212,255,0.12); color: #00d4ff; }
        .hdr-btn-secondary:hover { background: rgba(0,212,255,0.2); }

        /* ── Stats bar ── */
        .stats-bar {
            display: flex; gap: 0.5rem; padding: 0.75rem 1.5rem;
        }
        .stat-card {
            flex: 1; background: #1c1b1b; padding: 0.875rem 1.25rem;
            text-align: center; border-radius: 0.75rem; transition: background 0.2s;
        }
        .stat-value {
            font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 1.5rem;
            color: #00d4ff; display: block;
        }
        .stat-label {
            font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em;
            color: rgba(255,255,255,0.35); margin-top: 0.2rem; display: block;
        }

        /* ── Editor grid ── */
        .editor-container {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 0.75rem; padding: 0 1.5rem 2rem;
        }
        @media (max-width: 768px) { .editor-container { grid-template-columns: 1fr; } }

        .panel {
            background: #1c1b1b; border-radius: 0.75rem;
            height: calc(100vh - 200px); display: flex; flex-direction: column;
            min-height: 300px;
        }
        .panel-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 1.25rem;
            background: #201f1f; border-radius: 0.75rem 0.75rem 0 0;
        }
        .panel-header h2 {
            font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 0.9rem;
            color: #e5e2e1; letter-spacing: -0.01em;
        }
        .panel-tools-btn {
            display: flex; align-items: center; gap: 0.3rem;
            padding: 0.35rem 0.75rem; border: none; border-radius: 9999px;
            background: #353534; color: rgba(255,255,255,0.55);
            font-family: 'Inter', sans-serif; font-size: 0.68rem; font-weight: 500;
            cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.04em;
        }
        .panel-tools-btn:hover { background: #2a2a2a; color: white; }

        .panel-content {
            flex: 1; overflow-y: auto; padding: 0.5rem 0;
        }
        .panel-content::-webkit-scrollbar { width: 4px; }
        .panel-content::-webkit-scrollbar-track { background: transparent; }
        .panel-content::-webkit-scrollbar-thumb { background: #353534; border-radius: 9999px; }

        /* ── List items ── */
        .list-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.65rem 1.25rem; cursor: pointer; transition: background 0.15s;
        }
        .list-item:hover { background: rgba(255,255,255,0.03); }
        .list-item.selected { background: rgba(0,212,255,0.07); }
        .list-item.selected .item-name { color: #00d4ff; }

        .item-info { display: flex; align-items: center; gap: 0.6rem; min-width: 0; }
        .item-name {
            font-size: 0.825rem; color: #e5e2e1; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
        }
        .channel-logo {
            width: 28px; height: 28px; object-fit: contain; border-radius: 0.375rem;
            background: #353534; flex-shrink: 0;
        }
        .channel-count {
            background: #353534; color: rgba(255,255,255,0.5);
            padding: 0.1rem 0.5rem; border-radius: 9999px; font-size: 0.68rem;
            font-weight: 600; flex-shrink: 0;
        }

        .item-actions { display: flex; gap: 0.25rem; flex-shrink: 0; }
        .action-btn {
            background: none; border: none; cursor: pointer;
            padding: 0.3rem; color: rgba(255,255,255,0.3);
            border-radius: 0.375rem; transition: all 0.15s;
            display: flex; align-items: center; justify-content: center;
        }
        .action-btn:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); }
        .action-btn.eye-btn.hidden { color: #ff6b6b; }
        .action-btn .fa-trash:hover { color: #ffdad6; }

        /* ── Empty state ── */
        .empty-state {
            display: flex; align-items: center; justify-content: center;
            height: 100%; color: rgba(255,255,255,0.25); font-size: 0.8rem;
            text-align: center; padding: 2rem; line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="header-actions">
        <h1 class="header-title">Edit — <span>{{ playlist.name }}</span></h1>
        <div class="toolbar">
            <button class="hdr-btn hdr-btn-ghost" onclick="resetChanges()">Reset</button>
            <button class="hdr-btn hdr-btn-secondary" onclick="saveChanges()">Save</button>
            <button class="hdr-btn hdr-btn-primary" onclick="downloadEditedPlaylist()">Download</button>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-card">
            <span class="stat-value">{{ stats.total_groups }}</span>
            <span class="stat-label">Groups</span>
        </div>
        <div class="stat-card">
            <span class="stat-value">{{ stats.total_channels }}</span>
            <span class="stat-label">Channels</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="visibleChannels">{{ stats.total_visible_channels }}</span>
            <span class="stat-label">Visible</span>
        </div>
    </div>

    <div class="editor-container">

        <!-- Groups Panel -->
        <div class="panel">
            <div class="panel-header">
                <h2>Groups</h2>
                <button class="panel-tools-btn" onclick="showGroupTools()">
                    <i class="fas fa-sliders-h" style="font-size:11px;"></i> Tools
                </button>
            </div>
            <div class="panel-content" id="groupList">
                {% for group in groups %}
                <div class="list-item" data-group-id="{{ loop.index0 }}">
                    <div class="item-info">
                        <span class="item-name">{{ group.name }}</span>
                        <span class="channel-count">{{ group.channel_count }}</span>
                    </div>
                    <div class="item-actions">
                        <button class="action-btn eye-btn" title="Toggle visibility">
                            <i class="fas fa-eye" style="font-size:12px;"></i>
                        </button>
                        <button class="action-btn" title="Edit">
                            <i class="fas fa-pen" style="font-size:11px;"></i>
                        </button>
                        <button class="action-btn" title="Remove">
                            <i class="fas fa-trash" style="font-size:11px;"></i>
                        </button>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>

        <!-- Channels Panel -->
        <div class="panel">
            <div class="panel-header">
                <h2>Channels</h2>
                <button class="panel-tools-btn" onclick="showChannelTools()">
                    <i class="fas fa-sliders-h" style="font-size:11px;"></i> Tools
                </button>
            </div>
            <div class="panel-content" id="channelList">
                <div class="empty-state">Select a group to view its channels</div>
            </div>
        </div>

    </div>

    <!-- Channel item template -->
    <template id="channelItemTemplate">
        <div class="list-item" data-channel-id="">
            <div class="item-info">
                <img class="channel-logo" src="" alt="">
                <span class="channel-name item-name"></span>
            </div>
            <div class="item-actions">
                <button class="action-btn eye-btn" onclick="toggleChannelVisibility(this, event)">
                    <i class="fas fa-eye" style="font-size:12px;"></i>
                </button>
                <button class="action-btn" onclick="editChannel(this, event)">
                    <i class="fas fa-pen" style="font-size:11px;"></i>
                </button>
                <button class="action-btn" onclick="removeChannel(this, event)">
                    <i class="fas fa-trash" style="font-size:11px;"></i>
                </button>
            </div>
        </div>
    </template>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>
        const playlistData = {
            groups: {{ groups | tojson | safe }},
            selectedGroup: null,
            originalData: null
        };
    </script>
    <script src="{{ url_for('static', filename='js/playlist-editor.js') }}"></script>
</body>
</html>
