<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>m3u.guide — Player</title>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.8.0/dist/mpegts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

        body { background: #000; color: #e5e2e1; font-family: 'Inter', sans-serif; overflow: hidden; height: 100dvh; }

        /* ── Full-screen video canvas ── */
        #videoEl {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            object-fit: contain; background: #000; z-index: 1;
        }

        /* ── Top gradient overlay ── */
        .canvas-top-gradient {
            position: fixed; top: 0; left: 0; right: 0; height: 140px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.75) 0%, transparent 100%);
            z-index: 10; pointer-events: none;
        }
        .canvas-bottom-gradient {
            position: fixed; bottom: 0; left: 0; right: 0; height: 260px;
            background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%);
            z-index: 10; pointer-events: none;
        }

        /* ── Cinema header ── */
        .cinema-header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 50;
            height: 88px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 2rem;
        }
        .back-btn {
            display: flex; align-items: center; gap: 0.5rem;
            background: rgba(42,42,42,0.5); backdrop-filter: blur(16px);
            border: none; border-radius: 9999px;
            color: rgba(255,255,255,0.85); font-family: 'Inter', sans-serif;
            font-size: 0.72rem; font-weight: 500; padding: 0.5rem 1.1rem;
            cursor: pointer; text-decoration: none; transition: all 0.15s;
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .back-btn:hover { background: rgba(42,42,42,0.8); color: white; text-decoration: none; }
        .header-brand {
            font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 0.85rem;
            color: rgba(255,255,255,0.35); letter-spacing: -0.01em;
        }

        /* ── Status bar ── */
        #status-bar {
            position: fixed; top: 5rem; left: 50%; transform: translateX(-50%);
            z-index: 50; white-space: nowrap;
            padding: 0.4rem 1.25rem; border-radius: 9999px;
            font-size: 0.72rem; font-weight: 500; letter-spacing: 0.02em;
            display: none;
        }
        .s-loading { background: rgba(0,212,255,0.15); color: #00d4ff; display: block !important; }
        .s-live    { background: rgba(0,212,255,0.08); color: #3cd7ff; display: block !important; }
        .s-playing { display: none !important; }
        .s-error   { background: rgba(147,0,10,0.5); color: #ffdad6; display: block !important; }

        /* ── Bottom cinema control panel ── */
        .cinema-controls {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 1024px; z-index: 50;
        }
        .glass-panel {
            background: rgba(42,42,42,0.7); backdrop-filter: blur(28px);
            border-radius: 2rem; padding: 1.2rem 1.75rem;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 24px 60px rgba(0,0,0,0.8), 0 0 40px rgba(0,212,255,0.04);
            display: flex; flex-direction: column; gap: 0.65rem;
        }

        /* ── Control rows ── */
        .ctrl-row {
            display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
        }
        .ctrl-label {
            font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; color: rgba(255,255,255,0.2);
            white-space: nowrap; min-width: 2.75rem;
        }
        .ctrl-divider {
            height: 1px; background: rgba(255,255,255,0.04); margin: 0.05rem 0;
        }

        /* ── Player buttons ── */
        .player-btn {
            display: inline-flex; align-items: center; gap: 0.35rem;
            padding: 0.4rem 0.85rem; border: none; border-radius: 9999px;
            font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 500;
            cursor: pointer; text-decoration: none; transition: all 0.15s;
            color: rgba(255,255,255,0.75); background: rgba(53,53,52,0.9);
            text-transform: uppercase; letter-spacing: 0.04em;
        }
        .player-btn:hover { filter: brightness(1.3); color: white; text-decoration: none; }
        .player-btn.active {
            background: #00d4ff !important; color: #003642 !important;
            box-shadow: 0 0 20px rgba(0,212,255,0.4);
        }
        .btn-hls-proxy  { background: rgba(111,66,193,0.35); }
        .btn-ts-proxy   { background: rgba(0,212,255,0.2); color: #a8e8ff; }
        .btn-hls-direct { background: rgba(111,66,193,0.2); }
        .btn-ts-direct  { background: rgba(0,150,200,0.2); }
        .btn-vlc        { background: rgba(245,130,32,0.2); color: #ffba3d; }
        .btn-copy       { background: rgba(0,212,255,0.12); color: #a8e8ff; }
        .btn-copy-stream{ background: rgba(60,215,255,0.12); color: #3cd7ff; }
        .btn-reload     { background: rgba(42,42,42,0.9); }
        .player-btn .material-symbols-outlined { font-size: 14px; }

        /* ── Ambient glow ── */
        .ambient-glow {
            position: fixed; bottom: 0; left: 20%; width: 60%; height: 220px;
            background: radial-gradient(ellipse at center bottom, rgba(0,212,255,0.05) 0%, transparent 70%);
            pointer-events: none; z-index: 5;
        }
    </style>
</head>
<body>

    <video id="videoEl" controls autoplay playsinline></video>

    <div class="canvas-top-gradient"></div>
    <div class="canvas-bottom-gradient"></div>
    <div class="ambient-glow"></div>

    <header class="cinema-header">
        <a href="javascript:history.back()" class="back-btn">
            <span class="material-symbols-outlined" style="font-size:14px;">arrow_back</span>
            Back
        </a>
        <span class="header-brand">m3u.guide</span>
    </header>

    <div id="status-bar"></div>

    <div class="cinema-controls">
        <div class="glass-panel">

            <!-- Play mode row (live only) -->
            <div id="live-controls" style="display:none;">
                <div class="ctrl-row">
                    <span class="ctrl-label">Play via</span>
                    <button id="btn-hls-proxy"  class="player-btn btn-hls-proxy"  onclick="play('hls','proxy')">
                        <span class="material-symbols-outlined">play_circle</span> HLS + Proxy
                    </button>
                    <button id="btn-ts-proxy"   class="player-btn btn-ts-proxy"   onclick="play('ts','proxy')">
                        <span class="material-symbols-outlined">play_circle</span> TS + Proxy
                    </button>
                    <button id="btn-hls-direct" class="player-btn btn-hls-direct" onclick="play('hls','direct')">
                        <span class="material-symbols-outlined">wifi</span> HLS Direct
                    </button>
                    <button id="btn-ts-direct"  class="player-btn btn-ts-direct"  onclick="play('ts','direct')">
                        <span class="material-symbols-outlined">wifi</span> TS Direct
                    </button>
                </div>
                <div class="ctrl-divider" style="margin-top:0.65rem;"></div>
            </div>

            <!-- VLC row -->
            <div class="ctrl-row">
                <span class="ctrl-label">VLC</span>
                <a id="vlc-proxy-btn"  href="#" class="player-btn btn-vlc">
                    <span class="material-symbols-outlined">videocam</span> Proxy
                </a>
                <a id="vlc-direct-btn" href="#" class="player-btn btn-vlc" style="opacity:0.75;">
                    <span class="material-symbols-outlined">videocam</span> Direct
                </a>
                <a id="vlc-ios-btn"    href="#" class="player-btn btn-vlc" style="opacity:0.75;">
                    <span class="material-symbols-outlined">phone_iphone</span> iOS
                </a>
            </div>

            <div class="ctrl-divider"></div>

            <!-- Copy row -->
            <div class="ctrl-row">
                <span class="ctrl-label">Copy</span>
                <button onclick="copyProxyUrl('ts')"  class="player-btn btn-copy">
                    <span class="material-symbols-outlined">content_copy</span> Proxy TS
                </button>
                <button onclick="copyProxyUrl('hls')" class="player-btn btn-copy">
                    <span class="material-symbols-outlined">content_copy</span> Proxy HLS
                </button>
                <button onclick="copyDirect('ts')"    class="player-btn btn-copy-stream">
                    <span class="material-symbols-outlined">content_copy</span> Direct TS
                </button>
                <button onclick="copyDirect('hls')"   class="player-btn btn-copy-stream">
                    <span class="material-symbols-outlined">content_copy</span> Direct HLS
                </button>
                <button onclick="reloadPlayer()"      class="player-btn btn-reload">
                    <span class="material-symbols-outlined">refresh</span> Reload
                </button>
            </div>

        </div>
    </div>

    <script>
        const originalVideoUrl = "{{ video_url }}";

        function toTs(u)  { return u.replace(/\.m3u8(\?.*)?$/i, '.ts$1'); }
        function toHls(u) { return u.replace(/\.ts(\?.*)?$/i,   '.m3u8$1'); }

        const tsUrl  = toTs(originalVideoUrl);
        const hlsUrl = toHls(originalVideoUrl);

        const proxyBase  = window.location.origin + '/stream_proxy?url=';
        const tsProxy    = proxyBase + encodeURIComponent(tsUrl);
        const hlsProxy   = proxyBase + encodeURIComponent(hlsUrl);

        const urlLower = originalVideoUrl.toLowerCase();
        const isLive   = urlLower.endsWith('.ts') || urlLower.endsWith('.m3u8') || urlLower.includes('/live/');

        document.getElementById('vlc-proxy-btn').href  = 'vlc://' + tsProxy;
        document.getElementById('vlc-direct-btn').href = 'vlc://' + tsUrl;
        document.getElementById('vlc-ios-btn').href    = 'vlc-x-callback://x-callback-url/stream?url=' + encodeURIComponent(tsProxy);

        if (isLive) document.getElementById('live-controls').style.display = 'block';

        const video     = document.getElementById('videoEl');
        const statusBar = document.getElementById('status-bar');

        let mpegtsPlayer = null;
        let hlsPlayer    = null;
        let activeMode   = null;

        function setStatus(msg, type) {
            statusBar.textContent = msg;
            statusBar.className   = 's-' + type;
        }

        function destroyPlayers() {
            if (mpegtsPlayer) { try { mpegtsPlayer.destroy(); } catch(e){} mpegtsPlayer = null; }
            if (hlsPlayer)    { try { hlsPlayer.destroy();    } catch(e){} hlsPlayer    = null; }
            video.removeAttribute('src');
            video.load();
            document.querySelectorAll('#live-controls .player-btn').forEach(b => b.classList.remove('active'));
        }

        function play(format, via) {
            destroyPlayers();
            activeMode = { format, via };
            const btn = document.getElementById('btn-' + format + '-' + via);
            if (btn) btn.classList.add('active');

            const streamUrl = via === 'proxy'
                ? (format === 'hls' ? hlsProxy : tsProxy)
                : (format === 'hls' ? hlsUrl   : tsUrl);

            if (format === 'hls') loadHls(streamUrl);
            else                  loadTs(streamUrl);
        }

        function loadTs(url) {
            if (!mpegts.getFeatureList().mseLivePlayback) {
                setStatus('MSE not supported — try HLS or VLC.', 'error');
                return;
            }
            setStatus('Buffering MPEG-TS stream…', 'loading');
            mpegtsPlayer = mpegts.createPlayer({ type: 'mse', isLive: true, url }, {
                enableWorker: true,
                liveBufferLatencyChasing:    true,
                liveBufferLatencyMaxLatency: 10,
                liveBufferLatencyMinRemain:  2
            });
            mpegtsPlayer.attachMediaElement(video);
            mpegtsPlayer.load();
            mpegtsPlayer.play();
            mpegtsPlayer.on(mpegts.Events.STATISTICS_INFO, () => setStatus('', 'playing'));
            mpegtsPlayer.on(mpegts.Events.ERROR, (et, ed) => {
                const msg = (ed && ed.msg) ? ed.msg : et;
                setStatus('TS error: ' + msg + ' — try HLS or VLC (Proxy).', 'error');
            });
        }

        function loadHls(url) {
            if (!Hls.isSupported() && video.canPlayType('application/vnd.apple.mpegurl')) {
                setStatus('Loading HLS (native)…', 'loading');
                video.src = url;
                video.play();
                video.addEventListener('playing', () => setStatus('', 'playing'), { once: true });
                return;
            }
            if (!Hls.isSupported()) {
                setStatus('HLS not supported — try TS or VLC.', 'error');
                return;
            }
            setStatus('Loading HLS stream…', 'loading');
            hlsPlayer = new Hls({ lowLatencyMode: true });
            hlsPlayer.attachMedia(video);
            hlsPlayer.loadSource(url);
            hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => { video.play(); setStatus('', 'playing'); });
            hlsPlayer.on(Hls.Events.ERROR, (e, data) => {
                if (data.fatal) setStatus('HLS error: ' + data.details + ' — try TS or VLC (Proxy).', 'error');
            });
        }

        function reloadPlayer() {
            if (activeMode) play(activeMode.format, activeMode.via);
            else            initialLoad();
        }

        function initialLoad() {
            if (isLive) {
                play('ts', 'proxy');
            } else {
                setStatus('Loading…', 'loading');
                video.src = proxyBase + encodeURIComponent(originalVideoUrl);
                video.play();
                video.addEventListener('playing', () => setStatus('', 'playing'), { once: true });
            }
        }

        function copyProxyUrl(format) {
            writeToClipboard(format === 'hls' ? hlsProxy : tsProxy, format.toUpperCase() + ' proxy URL copied!');
        }
        function copyDirect(format) {
            writeToClipboard(format === 'hls' ? hlsUrl : tsUrl, format.toUpperCase() + ' direct URL copied!');
        }
        function writeToClipboard(text, msg) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => alert(msg));
            } else {
                const ta = Object.assign(document.createElement('textarea'),
                    { value: text, style: 'position:fixed;left:-9999px' });
                document.body.appendChild(ta); ta.focus(); ta.select();
                try { document.execCommand('copy'); alert(msg); }
                catch(e) { alert('Copy manually:\n' + text); }
                document.body.removeChild(ta);
            }
        }

        initialLoad();
    </script>
</body>
</html>
